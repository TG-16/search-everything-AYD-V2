<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
        }
        h2 { color: #2e7d32; margin-top: 0; }
        p { color: #555; line-height: 1.5; }
        .token-container {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .btn {
            display: inline-block;
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: bold;
        }
        .btn:hover { background: #1b5e20; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🎉 Login Successful!</h2>
        <p>Welcome, <strong id="user-name">User</strong>!</p>
        <p>Your backend successfully verified your identity via Google and generated an application-specific session JWT:</p>
        
        <strong>Your App JWT Token:</strong>
        <div id="token-box" class="token-container">Extracting token...</div>

        <a href="/" class="btn">Back to Login</a>
    </div>

    <script>
        // Parse parameters from the URL query string
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const name = urlParams.get('name');

        if (name) {
            document.getElementById('user-name').innerText = decodeURIComponent(name);
        }
        
        if (token) {
            document.getElementById('token-box').innerText = token;
            // Typically here you would save it: localStorage.setItem('token', token);
        } else {
            document.getElementById('token-box').innerText = "No token found in query parameters.";
            document.getElementById('token-box').style.color = '#red';
        }
    </script>
</body>
</html>
